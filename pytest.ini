

[pytest]
markers =
    tier1: Business-critical tests that run hourly and on every push
    tier2: Supporting tests that run on PRS or impacted changes
    tier3: Low-risk stable tests that run daily or on release branches
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = --html=reports/report.html --self-contained-html --json-report --json-report-file=reports/report.json
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
